<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Marshmallow Night - Strict Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050510; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; width: 100%; text-align: center; top: 5%; pointer-events: none; z-index: 1000; }
        #score-display { color: #ffb7c5; font-size: clamp(20px, 6vw, 40px); font-weight: bold; text-shadow: 0 0 15px #ff00ff; margin: 0; }
        #best-display { color: #ffff00; font-size: clamp(14px, 4vw, 24px); font-weight: bold; text-shadow: 0 0 8px #ff8800; margin-top: 5px; }
        #timer-display { color: #fff; font-size: 20px; margin-top: 8px; font-family: 'Courier New', Courier, monospace; letter-spacing: 2px; }
        #howto { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-align: center; z-index: 500; background: rgba(5, 5, 16, 0.9); padding: 25px; border-radius: 20px; border: 2px solid #ffb7c5; width: 85%; max-width: 320px; pointer-events: none; }
        #controls { position: absolute; top: 10px; right: 10px; z-index: 2000; display: flex; gap: 5px; }
        .btn-mini { padding: 12px 15px; background: rgba(255, 183, 197, 0.3); border: 2px solid #ffb7c5; color: #fff; cursor: pointer; border-radius: 8px; font-size: 14px; font-weight: bold; }
        .main-btn { position: absolute; top: 75%; left: 50%; transform: translate(-50%, -50%); padding: 20px 45px; font-size: 22px; border: none; cursor: pointer; border-radius: 50px; color: #fff; z-index: 1500; font-weight: bold; box-shadow: 0 0 20px rgba(255, 183, 197, 0.5); }
        #start-button { background: linear-gradient(45deg, #ffb7c5, #ff007f); }
        #retry-button { background: #ff007f; display: none; }
        
        #gao { position: absolute; display: none; pointer-events: none; z-index: 100; width: 160px; height: 160px; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 5 L62 38 L95 25 L78 55 L100 80 L65 75 L50 95 L35 75 L0 80 L22 55 L5 25 L38 38 Z" fill="%23ffff00" stroke="%23ff8800" stroke-width="3"/></svg>') no-repeat center; background-size: contain; }
        #gao-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff00ff; font-size: 32px; font-weight: bold; text-shadow: 2px 2px 0 #fff; white-space: nowrap; }
        @keyframes gao-pop { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(1.1); opacity: 0; } }
        .gao-active { display: block !important; animation: gao-pop 0.3s forwards; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score-display">SCORE:&nbsp;<span id="score">0</span></div>
        <div id="best-display">BEST:&nbsp;<span id="best-score">0</span></div>
        <div id="timer-display">TIME:&nbsp;<span id="time-left">03:31</span></div>
    </div>
    <div id="howto">
        <h2>BODY&nbsp;CATCH!</h2>
        <p>くぅちゃんを左右に動かして<br>
        星空から降ってくる<br>
        <span style="color:#ffb7c5; font-weight:bold;">大好きなマカロン</span>を<br>
        体当たりでキャッチしてね！</p>
    </div>
    <div id="controls"><button class="btn-mini" id="vol-btn">VOL: LOW</button><button class="btn-mini" id="mute-btn">MUTE: OFF</button><button class="btn-mini" id="stop-btn">STOP</button></div>
    <div id="gao"><div id="gao-text">がぉ！</div></div>
    <button id="start-button" class="main-btn">START GAME</button>
    <button id="retry-button" class="main-btn" onclick="location.reload()">RE-TRY?</button>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let scene, camera, renderer, model, shadow, score = 0, marshmallows = [], gameActive = false, isMuted = false, volState = 0.1, mouse = new THREE.Vector2(), spawnTimer, timerInterval, bgMusic = null, timeLeft = 211;
        const textureLoader = new THREE.TextureLoader();
        const textures = Array.from({length: 7}, (_, i) => textureLoader.load(`${i + 1}.png`));

        function init() {
            const saved = localStorage.getItem('marshmallow_high_score');
            if (saved) document.getElementById('best-score').innerText = saved;
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x050510);
            camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.8, 8); camera.lookAt(0, 1.5, 0); 
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 2.8));
            
            // 星空
            const starGeometry = new THREE.BufferGeometry();
            const starVertices = [];
            for (let i = 0; i < 1000; i++) {
                starVertices.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, -20);
            }
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            scene.add(new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 })));

            // 🚩地面の色を初期の緑に戻しました
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshBasicMaterial({ color: 0x112211 }));
            floor.rotation.x = -Math.PI/2; floor.position.y = -0.1; scene.add(floor);
            
            shadow = new THREE.Mesh(new THREE.CircleGeometry(1.5, 32), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 }));
            shadow.rotation.x = -Math.PI/2; shadow.position.y = -0.05; scene.add(shadow);
            
            new GLTFLoader().load('model.glb', (gltf) => { 
                model = gltf.scene; 
                model.scale.set(2.5, 2.5, 2.5);
                scene.add(model); 
            });
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (model) {
                const limit = window.innerWidth > window.innerHeight ? 5.0 : 3.0;
                model.position.x += (mouse.x * limit - model.position.x) * 0.15;
                if(shadow) shadow.position.x = model.position.x;
            }
            if (gameActive) {
                marshmallows.forEach((m, i) => {
                    m.position.y -= 0.06;
                    m.position.x += Math.sin(Date.now() / 400 + i) * 0.015;
                    m.rotation.z += 0.02;

                    if (model) {
                        // 🚩当たり判定を厳しく！ (2.0 → 1.2)
                        const dist = m.position.distanceTo(new THREE.Vector3(model.position.x, model.position.y + 1.5, model.position.z));
                        if (dist < 1.2) {
                            catchMarshmallow(m, i);
                            return;
                        }
                    }
                    if (m.position.y < -5) { scene.remove(m); marshmallows.splice(i, 1); }
                });
            }
            renderer.render(scene, camera);
        }

        function catchMarshmallow(target, index) {
            score += 100; document.getElementById('score').innerText = score;
            const vector = new THREE.Vector3(target.position.x, target.position.y, target.position.z);
            vector.project(camera);
            const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (vector.y * -0.5 + 0.5) * window.innerHeight;
            const g = document.getElementById('gao');
            g.style.left = (x - 80) + 'px'; g.style.top = (y - 80) + 'px';
            g.classList.remove('gao-active'); void g.offsetWidth; g.classList.add('gao-active');
            scene.remove(target); marshmallows.splice(index, 1);
            const currentBest = parseInt(localStorage.getItem('marshmallow_high_score') || 0);
            if (score > currentBest) { localStorage.setItem('marshmallow_high_score', score); document.getElementById('best-score').innerText = score; }
        }

        window.addEventListener('mousemove', (e) => { mouse.x = (e.clientX/window.innerWidth)*2-1; });
        window.addEventListener('touchstart', (e) => { const t = e.touches[0]; mouse.x = (t.clientX/window.innerWidth)*2-1; }, { passive: false });
        document.getElementById('vol-btn').addEventListener('click', () => { volState = (volState === 0.1) ? 0.5 : 0.1; document.getElementById('vol-btn').innerText = (volState === 0.1) ? "VOL: LOW" : "VOL: HIGH"; if (bgMusic) bgMusic.volume = volState; });
        document.getElementById('mute-btn').addEventListener('click', () => { isMuted = !isMuted; document.getElementById('mute-btn').innerText = isMuted ? "MUTE: ON" : "MUTE: OFF"; if (bgMusic) bgMusic.muted = isMuted; });
        document.getElementById('stop-btn').addEventListener('click', () => { location.reload(); });

        document.getElementById('start-button').addEventListener('click', () => {
            document.getElementById('start-button').style.display = 'none'; document.getElementById('howto').style.display = 'none';
            gameActive = true;
            if (!bgMusic) { bgMusic = new Audio('music.mp3'); bgMusic.onended = () => { gameActive = false; document.getElementById('retry-button').style.display = 'block'; }; }
            bgMusic.volume = volState; bgMusic.muted = isMuted; bgMusic.currentTime = 0; bgMusic.play().catch(() => {});
            timerInterval = setInterval(() => {
                if (!gameActive) { clearInterval(timerInterval); return; }
                timeLeft--;
                const min = Math.floor(timeLeft / 60), sec = timeLeft % 60;
                document.getElementById('time-left').innerText = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) { gameActive = false; clearInterval(timerInterval); document.getElementById('retry-button').style.display = 'block'; }
            }, 1000);
            spawnTimer = setInterval(() => {
                if(!gameActive) return;
                const m = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 2.5), new THREE.MeshBasicMaterial({ map: textures[Math.floor(Math.random() * 7)], transparent: true }));
                const spawnWidth = window.innerWidth > window.innerHeight ? 10 : 6;
                m.position.set((Math.random() - 0.5) * spawnWidth, 10, 0);
                scene.add(m); marshmallows.push(m);
            }, 600);
        });
        init();
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
